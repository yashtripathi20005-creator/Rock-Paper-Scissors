<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Rock Paper Scissors</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">You</span>
                <span class="score-value" id="player-score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Ties</span>
                <span class="score-value" id="tie-score">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Computer</span>
                <span class="score-value" id="computer-score">0</span>
            </div>
        </div>

        <div class="game-area">
            <div class="choice-display">
                <div class="choice-box" id="player-choice">
                    <div class="choice-emoji">❓</div>
                    <div class="choice-label">You</div>
                </div>
                <div class="vs">VS</div>
                <div class="choice-box" id="computer-choice">
                    <div class="choice-emoji">❓</div>
                    <div class="choice-label">Computer</div>
                </div>
            </div>

            <div class="result-message" id="result-message">Make your move!</div>
        </div>

        <div class="choice-buttons">
            <button class="choice-btn" data-choice="rock">
                <span class="emoji">✊</span>
                <span class="label">Rock</span>
            </button>
            <button class="choice-btn" data-choice="paper">
                <span class="emoji">✋</span>
                <span class="label">Paper</span>
            </button>
            <button class="choice-btn" data-choice="scissors">
                <span class="emoji">✌️</span>
                <span class="label">Scissors</span>
            </button>
        </div>

        <button class="reset-btn" id="reset-btn">Reset Score</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
